<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>КурлыкЯщик — Пользователь</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#eef2f5,#bccad7);padding:30px}
.card{max-width:1000px;margin:auto;background:#fff;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
input[type=search]{padding:10px;border-radius:10px;border:1px solid #ccc;width:260px}
.button{background:#2563eb;color:#fff;padding:10px 18px;border-radius:10px;border:none;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px}
.file{background:#f8fafc;border-radius:14px;padding:14px}
.small{color:#666;font-size:.9em}
progress{width:100%;height:16px}
</style></head><body><div class="card">
<div class="top"><div><h1>КурлыкЯщик</h1><div id="user"></div></div><div><input id="search" type="search" placeholder="Поиск файлов"> <input id="pick" type="file" multiple hidden><button class="button" onclick="pick.click()">Загрузить</button></div></div>
<p>Использовано хранилища:</p><progress id="bar" max="104857600" value="0"></progress><div id="usage" class="small"></div>
<div id="files" class="grid"></div></div>
<script>
const DB="KurlykDB";const STORE="state";
function openDB(){return new Promise((ok,no)=>{let r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{let db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:"key"});};r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error);});}
(async()=>{
const db=await openDB();const tx=db.transaction(STORE,"readwrite"),st=tx.objectStore(STORE);
function get(k){return new Promise(r=>{let q=st.get(k);q.onsuccess=()=>r(q.result?q.result.value:null);});}
function put(k,v){st.put({key:k,value:v});}
let user=await get("currentUser")||"test";
document.getElementById("user").textContent="Добро пожаловать, "+user+"!";
let files=await get("files");
if(!files){
files={test:[{n:"hello.txt",s:1234},{n:"bird.png",s:45231}],test2:[{n:"notes.pdf",s:93211}],test3:[{n:"kurlyk.mp3",s:5000000}]};
put("files",files);
}
render();
pick.onchange=()=>{
const arr=files[user]||[];
[...pick.files].forEach(f=>arr.push({n:f.name,s:f.size}));
files[user]=arr;put("files",files);render();
};
search.oninput=render;
function render(){
const list=(files[user]||[]).filter(f=>f.n.toLowerCase().includes(search.value.toLowerCase()));
filesDiv.innerHTML="";
let used=0;
list.forEach(f=>{used+=f.s;filesDiv.innerHTML+=`<div class=file><b>📄 ${f.n}</b><div class=small>${(f.s/1024).toFixed(1)} KB</div></div>`});
bar.value=used;usage.textContent=(used/1048576).toFixed(2)+" MB / 100 MB";files=document.getElementById("files");
}
const filesDiv=document.getElementById("files");
})();
</script></body></html>
