<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>КурлыкЯщик — Регистрация</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:linear-gradient(
        135deg,
        #eef2f5 0%,
        #d9e2ea 30%,
        #bccad7 55%,
        #aebfcc 75%,
        #dde4ea 100%
    );
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
}

img{
    width:120px;
    border-radius:24px;
    margin-bottom:20px;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}

h1{
    margin-bottom:20px;
}

#message{
    font-size:1.3rem;
    margin:30px 0;
    line-height:1.6;
}

.valid{
    color:#2563eb;
    font-weight:700;
}

.invalid{
    color:#d62828;
    font-weight:700;
}

.button{
    display:inline-block;
    margin-top:20px;
    padding:15px 32px;
    border-radius:18px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    font-weight:700;
    box-shadow:0 12px 28px rgba(37,99,235,.35);
    transition:.25s;
}

.button:hover{
    transform:translateY(-3px);
    box-shadow:0 18px 36px rgba(37,99,235,.45);
}

</style>
</head>

<body>

<div class="card">

<img src="https://maxenoz.github.io/KurlykLogo.jpeg" alt="КурлыкЯщик">

<h1>КурлыкЯщик</h1>

<div id="message">
Проверка аккаунта...
</div>

<a class="button" id="proceedButton" href="https://kurlykj.github.io/user/">
Зарегистрироваться и перейти в настройки аккаунта
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const username = params.get("username");

const message = document.getElementById("message");
const button = document.getElementById("proceedButton");

const validUsers = ["test", "test2", "test3"];

// Open (or create) the IndexedDB database
const request = indexedDB.open("KurlykDB", 1);

request.onupgradeneeded = function(event){

    const db = event.target.result;

    if(!db.objectStoreNames.contains("state")){
        db.createObjectStore("state", {
            keyPath: "key"
        });
    }

};

request.onsuccess = function(event){

    const db = event.target.result;

    if(username && validUsers.includes(username)){

        // Save the current user
        const transaction = db.transaction("state", "readwrite");
        const store = transaction.objectStore("state");

        store.put({
            key: "currentUser",
            value: username
        });

        message.innerHTML =
            'Ваше имя пользователя:<br><br><span class="valid">' +
            username +
            '</span>';

        // Go to /user/USERNAME/
        button.href = "/user/" + encodeURIComponent(username) + "/";
        button.style.display = "inline-block";

    }else{

        message.innerHTML =
            '<span class="invalid">Такой аккаунт не существует.</span>';

        button.style.display = "none";

    }

};

request.onerror = function(){

    message.innerHTML =
        '<span class="invalid">Не удалось открыть IndexedDB.</span>';

    button.style.display = "none";

};

</script>
</body>
</html>
